name: CI

# Vercel auto-deploys main, so a red gate here must block a bad deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build
