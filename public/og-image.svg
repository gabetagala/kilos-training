<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="rubber" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#ffffff"/>
      <circle cx="5" cy="5" r="1.0" fill="#222222" opacity="0.18"/>
    </pattern>
    <!-- Subtle radial glow in the icon area -->
    <radialGradient id="glow" cx="27%" cy="50%" r="28%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222222"/>
    </radialGradient>
    <!-- Right-side text fade -->
    <radialGradient id="text-glow" cx="70%" cy="46%" r="45%">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#222222"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#222222"/>

  <!-- Subtle glow behind icon -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#text-glow)"/>

  <!-- ── Vertical divider ── -->
  <rect x="380" y="60" width="1" height="510" fill="rgba(255,255,255,0.06)"/>

  <!-- ══════════════════════
       LEFT — G icon
  ══════════════════════ -->
  <!-- Icon squircle (240×240 centered in left column x=70..320, y=195..435) -->
  <rect x="70" y="195" width="240" height="240" rx="54" ry="54" fill="#2a2a2a"/>
  <!-- Tiled K mark — the favicon grid, scaled into the squircle -->
  <g transform="translate(95,195) scale(0.6897) translate(-118,-82)" fill="url(#rubber)">
    <rect x="118" y="82"  width="60" height="60" rx="6"/>
    <rect x="334" y="82"  width="60" height="60" rx="6"/>
    <rect x="118" y="154" width="60" height="60" rx="6"/>
    <rect x="262" y="154" width="60" height="60" rx="6"/>
    <rect x="118" y="226" width="60" height="60" rx="6"/>
    <rect x="190" y="226" width="60" height="60" rx="6"/>
    <rect x="118" y="298" width="60" height="60" rx="6"/>
    <rect x="262" y="298" width="60" height="60" rx="6"/>
    <rect x="118" y="370" width="60" height="60" rx="6"/>
    <rect x="334" y="370" width="60" height="60" rx="6"/>
  </g>

  <!-- ══════════════════════
       RIGHT — Text
  ══════════════════════ -->

  <!-- KILOS — main wordmark -->
  <text
    x="420" y="272"
    font-family="Impact, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="168"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-4"
  >KILOS</text>

  <!-- TRAINING — tracked sub-label -->
  <text
    x="426" y="310"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="rgba(255,255,255,0.38)"
    letter-spacing="16.5"
  >TRAINING</text>

  <!-- Thin rule -->
  <rect x="420" y="336" width="700" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Tagline -->
  <text
    x="420" y="380"
    font-family="'Courier New', Courier, monospace"
    font-size="17"
    fill="rgba(255,255,255,0.45)"
    letter-spacing="1"
  >Train heavy. Track everything. Free forever.</text>

  <!-- Three feature chips -->
  <rect x="420" y="422" width="120" height="28" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="480" y="441" font-family="'Courier New', Courier, monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">NO ADS</text>

  <rect x="554" y="422" width="120" height="28" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="614" y="441" font-family="'Courier New', Courier, monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">NO PAYWALL</text>

  <rect x="688" y="422" width="120" height="28" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="748" y="441" font-family="'Courier New', Courier, monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">NO BS</text>

  <!-- Bottom URL -->
  <text
    x="420" y="572"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="rgba(255,255,255,0.18)"
    letter-spacing="2"
  >kilostraining.app</text>

  <!-- Top accent line -->
  <rect width="1200" height="3" fill="rgba(255,255,255,0.12)"/>
  <!-- Bottom accent line -->
  <rect y="627" width="1200" height="3" fill="rgba(255,255,255,0.12)"/>
</svg>
