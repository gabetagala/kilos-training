<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="page-clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- ── Base: dark app background ── -->
  <rect width="1200" height="630" fill="#222222"/>

  <!-- ── Blurred ghost of the app behind the card (far edges) ── -->
  <g filter="url(#soft-blur)" opacity="0.35" clip-path="url(#page-clip)">
    <!-- Left ghost column -->
    <rect x="60" y="0" width="240" height="240" fill="#f5f5f3"/>
    <rect x="80" y="260" width="200" height="50" rx="3" fill="#ffffff" opacity="0.06"/>
    <rect x="80" y="322" width="180" height="50" rx="3" fill="#ffffff" opacity="0.06"/>
    <rect x="80" y="384" width="160" height="50" rx="3" fill="#ffffff" opacity="0.06"/>
    <!-- Right ghost column -->
    <rect x="900" y="0" width="240" height="240" fill="#f5f5f3"/>
    <rect x="920" y="260" width="200" height="50" rx="3" fill="#ffffff" opacity="0.06"/>
    <rect x="920" y="322" width="180" height="50" rx="3" fill="#ffffff" opacity="0.06"/>
  </g>

  <!-- ── Dark fade over the ghost edges ── -->
  <rect x="0" y="0" width="340" height="630" fill="#222222" opacity="0.78"/>
  <rect x="860" y="0" width="340" height="630" fill="#222222" opacity="0.78"/>

  <!-- ── Purple accent line — top ── -->
  <rect width="1200" height="4" fill="#863bff"/>

  <!-- ── Central home-screen card ── -->
  <!-- White hero panel — exactly like the app hero -->
  <rect x="340" y="60" width="520" height="260" fill="#f5f5f3"/>

  <!-- KILOS — large Bebas-style condensed wordmark -->
  <text
    x="370" y="196"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    fill="#222222"
    letter-spacing="-3"
  >KILOS</text>

  <!-- TRAINING — small tracked, same width treatment -->
  <text
    x="370" y="290"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="rgba(0,0,0,0.38)"
    letter-spacing="17.4"
  >TRAINING</text>

  <!-- White panel bottom separator line -->
  <rect x="340" y="316" width="520" height="1" fill="rgba(0,0,0,0.08)"/>

  <!-- ── Dark section below panel — start buttons ── -->
  <rect x="340" y="317" width="520" height="257" fill="#222222"/>

  <!-- Section label -->
  <text x="368" y="354" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.28)" letter-spacing="3">START</text>

  <!-- Button rows -->
  <rect x="368" y="365" width="464" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="368" y="400" font-family="Impact, 'Arial Black', sans-serif" font-size="28" fill="#ffffff" letter-spacing="0.5">Quick Start</text>
  <text x="808" y="400" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.28)" text-anchor="end">→</text>

  <rect x="368" y="410" width="464" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="368" y="444" font-family="Impact, 'Arial Black', sans-serif" font-size="28" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">Legends</text>
  <text x="808" y="444" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.18)" text-anchor="end">→</text>

  <rect x="368" y="454" width="464" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="368" y="488" font-family="Impact, 'Arial Black', sans-serif" font-size="28" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">CrossFit</text>
  <text x="808" y="488" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.14)" text-anchor="end">→</text>

  <rect x="368" y="498" width="464" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- Tagline at bottom of card -->
  <text x="600" y="546" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.18)" letter-spacing="3">TRAIN HEAVY · FREE FOREVER</text>

  <!-- ── Purple accent line — bottom ── -->
  <rect y="626" width="1200" height="4" fill="#863bff"/>
</svg>
