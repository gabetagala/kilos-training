<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Squircle background — ~23% radius matches iOS/Android icon spec -->
  <rect width="512" height="512" rx="118" ry="118" fill="#222222"/>
  <!--
    K mark — single white polygon.
    Shape: rectangle with a V-notch cut into the right side at the vertical midpoint.
    Left vertical edge = spine of the K.
    Upper diagonal = upper arm of K.
    Lower diagonal = lower arm of K.
    Notch depth ≈ 42% of mark width for a bold, deep cut.
  -->
  <polygon
    points="120,120 396,120 280,256 396,392 120,392"
    fill="#ffffff"
  />
</svg>
